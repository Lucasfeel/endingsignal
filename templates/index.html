<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>콘텐츠 완결 알리미</title>
  <meta content="light dark" name="color-scheme">
  <link href="{{ url_for('static', filename='favicon.svg') }}" rel="icon" type="image/svg+xml">
  <link href="{{ url_for('static', filename='favicon.svg') }}" rel="shortcut icon">
  <link crossorigin href="https://cdn.jsdelivr.net" rel="preconnect">
  <link
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    rel="stylesheet"
  >
  {% set sentry_surface = 'public-app' %}
  {% include '_sentry_loader.html' %}
  <link href="{{ url_for('static', filename='build/app-shell.css') }}" rel="stylesheet">
  <script>
    (function () {
      var resolvedTheme = 'light';
      try {
        var savedTheme = localStorage.getItem('es_theme');
        if (savedTheme === 'dark' || savedTheme === 'light') {
          resolvedTheme = savedTheme;
        } else if (typeof window.matchMedia === 'function') {
          resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
      } catch (_err) {}
      document.documentElement.dataset.theme = resolvedTheme;
      window.__ES_RUNTIME__ = {
        apiBaseUrl: {{ request.url_root.rstrip('/')|tojson }},
        app: 'public',
        posthog: {
          enabled: {{ posthog_public_enabled|tojson }},
          apiHost: {{ posthog_public_api_host|tojson }},
          projectApiKey: {{ posthog_public_key|tojson }}
        },
        sentry: {
          enabled: {{ sentry_frontend_enabled|tojson }},
          environment: {{ sentry_frontend_environment|tojson }},
          repo: {{ sentry_frontend_repo|tojson }},
          surface: {{ sentry_surface|tojson }}
        },
        theme: {
          initialTheme: resolvedTheme
        }
      };
    })();
  </script>
</head>
<body class="es-main-page antialiased">
  <div id="app-root"></div>
  <script src="{{ url_for('static', filename='build/public-app.js') }}" type="module"></script>
</body>
</html>
