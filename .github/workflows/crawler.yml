name: Cloud Dispatch

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  cloud-dispatch:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Materialize mTLS certificates
        shell: bash
        env:
          AIT_MTLS_CERT_PEM: ${{ secrets.AIT_MTLS_CERT_PEM }}
          AIT_MTLS_KEY_PEM: ${{ secrets.AIT_MTLS_KEY_PEM }}
          AIT_CA_BUNDLE_PEM: ${{ secrets.AIT_CA_BUNDLE_PEM }}
        run: |
          if [ -n "$AIT_MTLS_CERT_PEM" ]; then
            printf '%s' "$AIT_MTLS_CERT_PEM" > "$RUNNER_TEMP/ait-client-cert.pem"
            echo "AIT_MTLS_CERT_PATH=$RUNNER_TEMP/ait-client-cert.pem" >> "$GITHUB_ENV"
          fi
          if [ -n "$AIT_MTLS_KEY_PEM" ]; then
            printf '%s' "$AIT_MTLS_KEY_PEM" > "$RUNNER_TEMP/ait-client-key.pem"
            echo "AIT_MTLS_KEY_PATH=$RUNNER_TEMP/ait-client-key.pem" >> "$GITHUB_ENV"
          fi
          if [ -n "$AIT_CA_BUNDLE_PEM" ]; then
            printf '%s' "$AIT_CA_BUNDLE_PEM" > "$RUNNER_TEMP/ait-ca-bundle.pem"
            echo "AIT_CA_BUNDLE_PATH=$RUNNER_TEMP/ait-ca-bundle.pem" >> "$GITHUB_ENV"
          fi

      - name: Run cloud dispatch
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          AIT_COMPLETION_TEMPLATE_CODE: ${{ secrets.AIT_COMPLETION_TEMPLATE_CODE }}
        run: python run_cloud_dispatch.py
