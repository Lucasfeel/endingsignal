# Render Blueprint reference for the main endingsignal production service.
# This matches the current deployment shape: one Docker-based Flask service
# that serves the public web shell and API from the same app.
#
# Note:
# - This blueprint does not provision a new database. Keep using the existing
#   Render Postgres instance and provide DATABASE_URL from the Dashboard.
# - The live service currently uses the Render service name `endingsignal`.
# - Dashboard-only settings can still drift if they are edited outside this file.

services:
  - type: web
    name: endingsignal
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_APPLICATION_NAME
        value: endingsignal-web
      - key: DB_POOL_ENABLED
        value: "1"
      - key: DB_POOL_MINCONN
        value: "1"
      - key: DB_POOL_MAXCONN
        value: "4"
      - key: SKIP_DB_INIT
        value: "1"
      - key: DB_INIT_ENABLE_BACKFILL
        value: "0"
      - key: DB_INIT_STRICT_MAINTENANCE
        value: "false"
      - key: SENTRY_API_DSN
        sync: false
      - key: SENTRY_FRONTEND_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
