services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: endingsignal-web:latest
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      PORT: ${PORT:-5000}
      FLASK_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Seoul}
      RUN_DB_INIT: ${RUN_DB_INIT:-0}
      SKIP_DB_INIT: ${SKIP_DB_INIT:-0}
    restart: unless-stopped

  backfill-naver-series:
    build:
      context: .
      dockerfile: Dockerfile
    image: endingsignal-web:latest
    profiles: ["backfill"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Seoul}
    volumes:
      - ./.backfill_state:/app/.backfill_state
    entrypoint: ["python", "scripts/backfill_naver_series_only.py"]
    command: []
    restart: "no"

  backfill-kakao-page:
    build:
      context: .
      dockerfile: Dockerfile.backfill
    image: endingsignal-backfill:latest
    profiles: ["backfill"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Seoul}
      KAKAOPAGE_COOKIE_HEADER: ${KAKAOPAGE_COOKIE_HEADER:-}
      KAKAOPAGE_COOKIES_JSON: ${KAKAOPAGE_COOKIES_JSON:-}
      KAKAOPAGE_SEED_SET: ${KAKAOPAGE_SEED_SET:-webnoveldb}
      KAKAOPAGE_BACKFILL_PHASE: ${KAKAOPAGE_BACKFILL_PHASE:-all}
      KAKAOPAGE_BACKFILL_MIN_MEMORY_FOR_PLAYWRIGHT_MB: ${KAKAOPAGE_BACKFILL_MIN_MEMORY_FOR_PLAYWRIGHT_MB:-1024}
      KAKAOPAGE_BACKFILL_ALLOW_LOW_MEMORY_PLAYWRIGHT: ${KAKAOPAGE_BACKFILL_ALLOW_LOW_MEMORY_PLAYWRIGHT:-0}
      KAKAOPAGE_BACKFILL_PLAYWRIGHT_ARGS_JSON: ${KAKAOPAGE_BACKFILL_PLAYWRIGHT_ARGS_JSON:-}
      KAKAOPAGE_BACKFILL_DETAIL_CONCURRENCY: ${KAKAOPAGE_BACKFILL_DETAIL_CONCURRENCY:-2}
      KAKAOPAGE_BACKFILL_MIN_INTERVAL_SECONDS: ${KAKAOPAGE_BACKFILL_MIN_INTERVAL_SECONDS:-1.0}
      KAKAOPAGE_BACKFILL_DETAIL_JITTER_MIN_SECONDS: ${KAKAOPAGE_BACKFILL_DETAIL_JITTER_MIN_SECONDS:-0.8}
      KAKAOPAGE_BACKFILL_DETAIL_JITTER_MAX_SECONDS: ${KAKAOPAGE_BACKFILL_DETAIL_JITTER_MAX_SECONDS:-1.8}
      KAKAOPAGE_BACKFILL_MAX_CONSECUTIVE_RATE_LIMITS: ${KAKAOPAGE_BACKFILL_MAX_CONSECUTIVE_RATE_LIMITS:-5}
      KAKAOPAGE_BACKFILL_COOLDOWN_SECONDS: ${KAKAOPAGE_BACKFILL_COOLDOWN_SECONDS:-900}
      KAKAOPAGE_BACKFILL_DISCOVERY_SCROLL_DELAY_MS: ${KAKAOPAGE_BACKFILL_DISCOVERY_SCROLL_DELAY_MS:-1600}
    volumes:
      - ./.backfill_state:/app/.backfill_state
    shm_size: "1gb"
    entrypoint: ["python", "scripts/backfill_kakao_page_only.py"]
    command: []
    restart: "no"

  db:
    image: postgres:16-alpine
    profiles: ["with-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-endingsignal}
      POSTGRES_USER: ${POSTGRES_USER:-endingsignal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-endingsignal}
      TZ: ${DB_TIMEZONE:-Asia/Seoul}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-endingsignal} -d ${POSTGRES_DB:-endingsignal}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
